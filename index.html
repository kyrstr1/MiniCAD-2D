<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini CAD PRO</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:#e2e8f0;
}

header{
  text-align:center;
  padding:12px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  font-weight:bold;
}

.toolbar{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#020617;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:#e2e8f0;
  cursor:pointer;
  transition:0.2s;
}

button:hover{ background:#334155; }

button.active{
  background:#38bdf8;
  color:black;
}

canvas{
  display:block;
  margin:auto;
  background:#020617;
  cursor:crosshair;
}

.panel{
  position:absolute;
  background:#020617;
  border:1px solid #334155;
  padding:10px;
  border-radius:8px;
}

.panel input{
  width:80px;
  margin-bottom:6px;
}

.closeBtn{
  float:right;
  cursor:pointer;
  color:red;
}
</style>
</head>

<body>

<header>Mini CAD</header>

<div class="toolbar">
  <button id="lineBtn" class="active">Çizgi</button>
  <button id="rectBtn">Dikdörtgen</button>
  <button id="measureBtn">Ölçü</button>
  <button id="deleteBtn">Sil</button>
  <button id="dashBtn">Kesik</button>
  <button id="exportBtn">Export</button>
</div>

<canvas id="c" width="1100" height="600"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let tool="line";
let shapes=[];
let measures=[];

let drawing=false,start=null,current=null;
let scale=1;
let dashed=false;

// SNAP
const grid=25;
function snap(v){return Math.round(v/grid)*grid}

// DRAW
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,c.width,c.height);
  ctx.setTransform(scale,0,0,scale,0,0);

  // GRID
  ctx.strokeStyle="#1e293b";
  for(let x=0;x<c.width;x+=25){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,c.height); ctx.stroke();
  }
  for(let y=0;y<c.height;y+=25){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(c.width,y); ctx.stroke();
  }

  // SHAPES
  shapes.forEach(s=>{
    ctx.setLineDash(s.dashed ? [8,6] : []);
    ctx.strokeStyle="#38bdf8";
    ctx.lineWidth=2;

    if(s.type==="line"){
      ctx.beginPath();
      ctx.moveTo(s.x1,s.y1);
      ctx.lineTo(s.x2,s.y2);
      ctx.stroke();
    }

    if(s.type==="rect"){
      ctx.strokeRect(s.x,s.y,s.w,s.h);
    }
  });

  ctx.setLineDash([]);

  // MEASURE
  measures.forEach(m=>{
    let dx=m.x2-m.x1;
    let dy=m.y2-m.y1;
    let len=Math.sqrt(dx*dx+dy*dy);

    let nx=-dy/len;
    let ny=dx/len;

    let off=m.offset||30;

    let p1={x:m.x1+nx*off,y:m.y1+ny*off};
    let p2={x:m.x2+nx*off,y:m.y2+ny*off};

    ctx.strokeStyle="#4ade80";

    ctx.beginPath();
    ctx.moveTo(p1.x,p1.y);
    ctx.lineTo(p2.x,p2.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(m.x1,m.y1);
    ctx.lineTo(p1.x,p1.y);
    ctx.moveTo(m.x2,m.y2);
    ctx.lineTo(p2.x,p2.y);
    ctx.stroke();

    let val=m.value ?? len;

    let prefix="";
    if(m.mode==="diameter") prefix="Ø";
    if(m.mode==="radius") prefix="R";

    let tx=(p1.x+p2.x)/2;
    let ty=(p1.y+p2.y)/2;

    ctx.fillStyle="#22c55e";
    ctx.font="16px Arial";
    ctx.fillText(prefix+val.toFixed(1)+" mm",tx,ty);

    m.hit={x:tx-40,y:ty-15,w:80,h:30};
  });

  // PREVIEW
  if(drawing && start && current){
    ctx.setLineDash(dashed ? [8,6] : []);
    ctx.strokeStyle="#facc15";

    if(tool==="line"){
      ctx.beginPath();
      ctx.moveTo(start.x,start.y);
      ctx.lineTo(current.x,current.y);
      ctx.stroke();
    }

    if(tool==="rect"){
      ctx.strokeRect(start.x,start.y,current.x-start.x,current.y-start.y);
    }
  }
}

// PANEL
function createPanel(m,x,y){
  document.querySelectorAll(".panel").forEach(p=>p.remove());

  let div=document.createElement("div");
  div.className="panel";

  div.innerHTML=`
    <span class="closeBtn">X</span><br>
    Uzunluk:<br>
    <input type="number" value="${m.value||''}"><br>
    Offset:<br>
    <input type="number" value="${m.offset||30}"><br>
    <button>mm</button>
    <button>Ø</button>
    <button>R</button><br><br>
    <button>Kaydet</button>
  `;

  div.style.left=x+"px";
  div.style.top=y+"px";

  document.body.appendChild(div);

  let close=div.querySelector(".closeBtn");
  let inputs=div.querySelectorAll("input");
  let buttons=div.querySelectorAll("button");

  close.onclick=()=>div.remove();

  buttons[0].onclick=()=>m.mode="normal";
  buttons[1].onclick=()=>m.mode="diameter";
  buttons[2].onclick=()=>m.mode="radius";

  buttons[3].onclick=()=>{
    m.value=parseFloat(inputs[0].value);
    m.offset=parseFloat(inputs[1].value);
    draw();
    div.remove();
  };
}

// MOUSE
c.addEventListener("mousedown",e=>{
  const r=c.getBoundingClientRect();
  let x=snap((e.clientX-r.left)/scale);
  let y=snap((e.clientY-r.top)/scale);

  if(tool==="delete"){
    shapes=shapes.filter(s=>{
      if(s.type==="line"){
        let d=Math.abs((s.y2-s.y1)*x-(s.x2-s.x1)*y+s.x2*s.y1-s.y2*s.x1)/
        Math.hypot(s.x2-s.x1,s.y2-s.y1);
        return d>8;
      }
      if(s.type==="rect"){
        return !(x>s.x && x<s.x+s.w && y>s.y && y<s.y+s.h);
      }
      return true;
    });

    measures=measures.filter(m=>!(x>m.hit.x && x<m.hit.x+m.hit.w && y>m.hit.y && y<m.hit.y+m.hit.h));

    draw();
    return;
  }

  for(let m of measures){
    if(x>m.hit.x && x<m.hit.x+m.hit.w && y>m.hit.y && y<m.hit.y+m.hit.h){
      createPanel(m,e.clientX,e.clientY);
      return;
    }
  }

  start={x,y};
  drawing=true;
});

c.addEventListener("mousemove",e=>{
  if(!drawing) return;

  const r=c.getBoundingClientRect();
  current={
    x:snap((e.clientX-r.left)/scale),
    y:snap((e.clientY-r.top)/scale)
  };

  draw();
});

c.addEventListener("mouseup",()=>{
  if(!drawing) return;
  drawing=false;

  if(tool==="line"){
    shapes.push({type:"line",x1:start.x,y1:start.y,x2:current.x,y2:current.y,dashed});
  }

  if(tool==="rect"){
    shapes.push({type:"rect",x:start.x,y:start.y,w:current.x-start.x,h:current.y-start.y,dashed});
  }

  if(tool==="measure"){
    measures.push({x1:start.x,y1:start.y,x2:current.x,y2:current.y,offset:30});
  }

  start=null;
  current=null;
  draw();
});

// ZOOM
c.addEventListener("wheel",e=>{
  e.preventDefault();
  scale+= e.deltaY * -0.001;
  scale=Math.min(Math.max(0.5,scale),3);
  draw();
});

// TOOL
lineBtn.onclick=()=>{tool="line"; setActive(lineBtn)}
rectBtn.onclick=()=>{tool="rect"; setActive(rectBtn)}
measureBtn.onclick=()=>{tool="measure"; setActive(measureBtn)}
deleteBtn.onclick=()=>{tool="delete"; setActive(deleteBtn)}
dashBtn.onclick=()=>{dashed=!dashed; dashBtn.classList.toggle("active")}

function setActive(btn){
  document.querySelectorAll(".toolbar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// EXPORT
exportBtn.onclick=()=>{
  let temp=scale;
  scale=1;
  draw();

  let link=document.createElement("a");
  link.download="cad.png";
  link.href=c.toDataURL();
  link.click();

  scale=temp;
  draw();
};

draw();
</script>

</body>
</html>
